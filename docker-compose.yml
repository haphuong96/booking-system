services:
  postgres:
    image: postgres:18.4-alpine3.23
    container_name: booking-system-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_system"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
